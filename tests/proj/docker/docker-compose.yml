services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
    - ${PROJ_PORT:-5000}:5000
    environment:
      DATABASE_URL: postgresql://proj:proj@postgres:5432/proj
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    profiles:
    - test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:16
    ports:
    - ${PG_PORT:-5433}:5432
    environment:
      POSTGRES_USER: proj
      POSTGRES_PASSWORD: proj
      POSTGRES_DB: proj
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U proj
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:latest
    ports:
    - ${REDIS_PORT:-6380}:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
