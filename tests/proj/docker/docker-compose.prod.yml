services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: proj-counter:latest
    environment:
      DATABASE_URL: postgresql://proj:proj@postgres:5432/proj
      REDIS_URL: redis://redis:6379/0
    labels:
      caddy: rundbat.apps1.jointheleague.org
      caddy.reverse_proxy: "{{upstreams 5000}}"
    restart: unless-stopped
    networks:
    - default
    - caddy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: proj
      POSTGRES_PASSWORD: proj
      POSTGRES_DB: proj
    volumes:
    - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U proj
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:latest
    volumes:
    - redisdata:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  caddy:
    external: true
