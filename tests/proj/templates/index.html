<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Counter App</title>
</head>
<body>
    <h1>Flask Counter App</h1>

    <section>
        <h2>PostgreSQL Counter</h2>
        <p>{{ pg_count }}</p>
        <form method="POST" action="/increment/postgres">
            <button type="submit">Increment Postgres</button>
        </form>
    </section>

    <section>
        <h2>Redis Counter</h2>
        <p>{{ redis_count }}</p>
        <form method="POST" action="/increment/redis">
            <button type="submit">Increment Redis</button>
        </form>
    </section>
</body>
</html>
